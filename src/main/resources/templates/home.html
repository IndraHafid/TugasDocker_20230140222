<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Website 20210140019</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 18px;
        }
        
        .actions {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .btn {
            padding: 12px 24px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #0056b3;
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #f8f9fa;
            font-weight: bold;
            color: #333;
        }
        
        tr:hover {
            background-color: #f8f9fa;
        }
        
        .no-data {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 20px;
        }
        
        .logout {
            text-align: right;
            margin-top: 20px;
        }
        
        .logout a {
            color: #dc3545;
            text-decoration: none;
            font-weight: bold;
        }
        
        .logout a:hover {
            text-decoration: underline;
        }
        
        .user-info {
            text-align: right;
            margin-bottom: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="user-info">
            Selamat datang, <span th:text="${username}">admin</span> (<span th:text="${nim}">20210140019</span>)
        </div>
        
        <div class="header">
            <h1>MY Website 20210140019</h1>
            <p>Selamat datang di aplikasi</p>
        </div>
        
        <div class="actions">
            <a th:href="@{/form}" class="btn">Input Data Mahasiswa</a>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>NIM</th>
                        <th>Jenis Kelamin</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="4" class="no-data">Belum ada data</td>
                    </tr>
                    <tr th:each="student, stat : ${students}">
                        <td th:text="${stat.count}">1</td>
                        <td th:text="${student.nama}">Nama</td>
                        <td th:text="${student.nim}">NIM</td>
                        <td th:text="${student.jenisKelamin}">Jenis Kelamin</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="logout">
            <a th:href="@{/logout}">Logout</a>
        </div>
    </div>
</body>
</html>
